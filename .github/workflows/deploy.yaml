name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via SSH
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd ${{ secrets.SSH_WORKDIR }}
          git pull origin main
          source ~/.bashrc
          # Export variables from .env
          set -a
          [ -f .env ] && . .env
          set +a
          # Build ldflags from .env
          LDFLAGS=""
          while IFS='=' read -r key value; do
            # Skip comments and empty lines
            if [[ ! "$key" =~ ^# && -n "$key" && -n "$value" ]]; then
              # Adjust the package path below to match your Go variable package
              LDFLAGS="$LDFLAGS -X 'github.com/w33ladalah/split-billing-whatsapp/internal/config.${key}=${value}'"
            fi
          done < <(grep -v '^#' .env | grep '=')
          # Build with ldflags
          CGO_ENABLED=1 ${{ secrets.SSH_GOPATH }}/bin/go build -ldflags="$LDFLAGS" -o build/bot .
          sudo -n systemctl restart splitbillbot.service
        EOF
